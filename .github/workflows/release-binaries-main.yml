name: Release Binaries (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binaries-main
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --bins --locked --manifest-path Cargo.toml

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf artifacts/albedo-binaries-ubuntu-x64.tar.gz \
            target/release/albedo \
            target/release/dom-compiler \
            target/release/albedo-bench

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: albedo-linux
          path: artifacts/albedo-binaries-ubuntu-x64.tar.gz
          retention-days: 1

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --bins --locked --manifest-path Cargo.toml

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf artifacts/albedo-binaries-macos-x64.tar.gz \
            target/release/albedo \
            target/release/dom-compiler \
            target/release/albedo-bench

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: albedo-macos
          path: artifacts/albedo-binaries-macos-x64.tar.gz
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --bins --locked --manifest-path Cargo.toml
        env:
          CARGO_INCREMENTAL: "0"

      - name: Package binaries
        shell: pwsh
        run: |
          mkdir -Force artifacts | Out-Null
          Compress-Archive -Path target/release/albedo.exe, target/release/dom-compiler.exe, target/release/albedo-bench.exe -DestinationPath artifacts/albedo-binaries-windows-x64.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: albedo-windows
          path: artifacts/albedo-binaries-windows-x64.zip
          retention-days: 1

  build-msi:
    name: Build MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --bin albedo --locked --manifest-path Cargo.toml
        env:
          CARGO_INCREMENTAL: "0"

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.0

      - name: Copy installer source
        shell: pwsh
        run: |
          $targetDir = "target\release\installer"
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          Copy-Item -Path "installer\windows\AlBDO.wxs" -Destination "$targetDir\AlBDO.wxs" -Force

      - name: Build MSI
        shell: pwsh
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Push-Location target\release\installer
          wix build AlBDO.wxs -o "..\AlBDO-Experimental-x64.msi"
          Pop-Location

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: albedo-msi
          path: target/release/AlBDO-Experimental-x64.msi
          retention-days: 1

  release:
    name: Create Rolling Release
    needs: [build-linux, build-macos, build-windows, build-msi]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: albedo-linux
          path: artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: albedo-macos
          path: artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: albedo-windows
          path: artifacts

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: albedo-msi
          path: msi

      - name: List artifacts
        run: ls -la artifacts/ msi/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          
          commit_sha="${{ github.sha }}"
          date=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          repo="${{ github.repository }}"
          
          notes=$(cat <<NOTES
          ## AlBDO Experimental Release

          **Commit:** \`$commit_sha\`
          **Date:** $date

          ### Included Artifacts
          - \`albedo-binaries-ubuntu-x64.tar.gz\` - Linux x64 binaries
          - \`albedo-binaries-macos-x64.tar.gz\` - macOS x64 binaries
          - \`albedo-binaries-windows-x64.zip\` - Windows x64 binaries
          - \`AlBDO-Experimental-x64.msi\` - Windows MSI Installer (recommended)

          ### Installation

          #### Windows (MSI Installer - Recommended)
          1. Download \`AlBDO-Experimental-x64.msi\`
          2. Double-click to install (no admin required)
          3. Open terminal and run \`albedo init my-app\`

          #### Windows (Portable)
          1. Extract \`albedo-binaries-windows-x64.zip\`
          2. Add the extracted folder to your PATH
          3. Run \`albedo init my-app\`

          #### Linux / macOS
          1. Extract the tarball
          2. Add the binaries to your PATH
          3. Run \`./albedo init my-app\`
          NOTES
          )
          
          gh release view main-latest --repo "$repo" > /dev/null 2>&1 || \
            gh release create main-latest --repo "$repo" --title "Main Branch Binaries" --notes "$notes" --prerelease --target "$commit_sha"
          
          gh release edit main-latest --repo "$repo" --title "Main Branch Binaries" --notes "$notes" --prerelease --target "$commit_sha" 2>/dev/null || true

      - name: Upload Linux artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "main-latest" artifacts/albedo-binaries-ubuntu-x64.tar.gz --repo "${{ github.repository }}" --clobber

      - name: Upload macOS artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "main-latest" artifacts/albedo-binaries-macos-x64.tar.gz --repo "${{ github.repository }}" --clobber

      - name: Upload Windows artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "main-latest" artifacts/albedo-binaries-windows-x64.zip --repo "${{ github.repository }}" --clobber || {
            gh release delete-asset "main-latest" -o "${{ github.repository }}" -n "albedo-binaries-windows-x64.zip" --yes
            gh release upload "main-latest" artifacts/albedo-binaries-windows-x64.zip --repo "${{ github.repository }}"
          }

      - name: Upload MSI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "main-latest" msi/AlBDO-Experimental-x64.msi --repo "${{ github.repository }}" --clobber || {
            gh release delete-asset "main-latest" -o "${{ github.repository }}" -n "AlBDO-Experimental-x64.msi" --yes
            gh release upload "main-latest" msi/AlBDO-Experimental-x64.msi --repo "${{ github.repository }}"
          }

      - name: Verify Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view main-latest --repo "${{ github.repository }}" --json assets --output json | jq '.assets[].name'
