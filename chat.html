<head>

:root {
  --bg-0: #04050b;
  --bg-1: #0a0f1f;
  --bg-2: #1b1330;
  --ink: #f3f4f6;
  --muted: #aeb4c7;
  --line: #f3f4f6;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  background:
    radial-gradient(circle at 12% 15%, rgba(56, 189, 248, 0.18), transparent 35%),
    radial-gradient(circle at 90% 10%, rgba(236, 72, 153, 0.2), transparent 34%),

/* =====================================================================
   AlBDO Starter — hand-crafted stylesheet
   ---------------------------------------------------------------------
   AlBDO's dev pipeline concatenates every .css file under the project
   root into a single inline <style> block, so this file ships as-is —
   no bundler, no PostCSS, no Tailwind required.
   ===================================================================== */

:root {
  --ink: #f4f5fb;
  --muted: #a8b0c7;
  --dim: #6b7390;
  --panel: rgba(20, 22, 38, 0.72);
  --panel-hi: rgba(30, 33, 54, 0.86);
  --line: rgba(160, 176, 220, 0.14);
  --line-hi: rgba(160, 176, 220, 0.28);

  --tier-a: #34d399;
  --tier-b: #60a5fa;
  --tier-c: #c084fc;

  --glow-a: 0 0 24px rgba(52, 211, 153, 0.35);
  --glow-b: 0 0 24px rgba(96, 165, 250, 0.35);
  --glow-c: 0 0 24px rgba(192, 132, 252, 0.35);

  --radius: 14px;
  --radius-lg: 22px;

  --font-sans: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont,
    "Helvetica Neue", Arial, sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas,
    monospace;
}

html,
body {
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.app-shell {
  max-width: 1120px;
  margin: 0 auto;
  padding: 72px 28px 120px;
}

/* --- Nav ----------------------------------------------------------- */

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 56px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.02em;
  color: var(--ink);
}

.brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: conic-gradient(
    from 210deg at 50% 50%,
    #34d399,
    #60a5fa,
    #c084fc,
    #34d399
  );
  box-shadow: 0 0 20px rgba(96, 165, 250, 0.45);
}

.nav-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--line-hi);
  background: var(--panel);
  color: var(--muted);
  font-size: 13px;
  font-family: var(--font-mono);
}

.nav-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--tier-a);
  box-shadow: var(--glow-a);
}

/* --- Hero ---------------------------------------------------------- */

.hero {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 40px 0 56px;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  align-self: flex-start;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--line-hi);
  background: var(--panel);
  color: var(--muted);
  font-size: 13px;
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

.hero-title {
  margin: 0;
  font-size: clamp(42px, 6vw, 68px);
  line-height: 1.04;
  letter-spacing: -0.02em;
  font-weight: 700;
  color: var(--ink);
}

.hero-title .accent {
  background: linear-gradient(
    100deg,
    #a7f3d0 0%,
    #60a5fa 45%,
    #c084fc 100%
  );
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.hero-sub {
  max-width: 640px;
  margin: 0;
  color: var(--muted);
  font-size: 18px;
  line-height: 1.6;
}

.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 22px;
  border-radius: 10px;
  font-weight: 500;
  font-size: 14px;
  letter-spacing: 0.01em;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 120ms ease, background 120ms ease,
    border-color 120ms ease, box-shadow 200ms ease;
  text-decoration: none;
  color: var(--ink);
  background: transparent;
  font-family: inherit;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn-primary {
  background: linear-gradient(130deg, #60a5fa 0%, #a78bfa 100%);
  color: #0b0d18;
  box-shadow: 0 8px 32px rgba(96, 165, 250, 0.3);
}

.btn-primary:hover {
  box-shadow: 0 12px 36px rgba(96, 165, 250, 0.45);
}

.btn-ghost {
  border-color: var(--line-hi);
  background: var(--panel);
  color: var(--ink);
}

.btn-ghost:hover {
  background: var(--panel-hi);
  border-color: var(--line-hi);
}

/* --- Tier grid ----------------------------------------------------- */

.section-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin: 56px 0 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.section-heading h2 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.section-heading .tag {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.14em;
}

.tier-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 18px;
}

.card {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 22px 22px 24px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  background: var(--panel);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  overflow: hidden;
  isolation: isolate;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(
    120% 80% at 0% 0%,
    rgba(255, 255, 255, 0.04),
    transparent 55%
  );
  z-index: -1;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tier-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid transparent;
}

.tier-a .tier-badge {
  color: var(--tier-a);
  border-color: rgba(52, 211, 153, 0.35);
  background: rgba(52, 211, 153, 0.08);
  box-shadow: var(--glow-a);
}

.tier-b .tier-badge {
  color: var(--tier-b);
  border-color: rgba(96, 165, 250, 0.35);
  background: rgba(96, 165, 250, 0.08);
  box-shadow: var(--glow-b);
}

.tier-c .tier-badge {
  color: var(--tier-c);
  border-color: rgba(192, 132, 252, 0.35);
  background: rgba(192, 132, 252, 0.08);
  box-shadow: var(--glow-c);
}

.card-title {
  margin: 2px 0 0;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.card-body {
  color: var(--muted);
  font-size: 14.5px;
  line-height: 1.6;
  margin: 0;
}

.card-meta {
  display: flex;
  gap: 18px;
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--dim);
}

.card-meta span {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.card-meta .kv {
  color: var(--ink);
}

/* --- Counter (Tier B) --------------------------------------------- */

.counter-action {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 4px;
}

.counter-value {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  min-width: 56px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.counter-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 500;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  background: rgba(96, 165, 250, 0.14);
  color: #bfdbfe;
  border: 1px solid rgba(96, 165, 250, 0.35);
  transition: background 120ms ease, transform 100ms ease;
}

.counter-btn:hover {
  background: rgba(96, 165, 250, 0.22);
}

.counter-btn:active {
  transform: translateY(1px);
}

/* --- LiveFeed (Tier C) -------------------------------------------- */

.feed-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.feed-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--line);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}

.feed-item .index {
  flex: 0 0 auto;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--tier-c);
  padding-top: 2px;
}

/* --- Footer -------------------------------------------------------- */

.footer {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 72px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
  color: var(--dim);
  font-size: 13px;
  font-family: var(--font-mono);
}

.footer a {
  color: var(--muted);
  text-decoration: none;
  transition: color 120ms ease;
}

.footer a:hover {
  color: var(--ink);
}

/* --- Responsive ---------------------------------------------------- */

@media (max-width: 600px) {
  .app-shell {
    padding: 40px 18px 80px;
  }
  .hero {
    padding: 24px 0 40px;
  }
  .nav {
    padding-bottom: 32px;
  }
  .section-heading {
    margin-top: 40px;
  }
}

      if (!name) continue;

      if (type === 'password') continue;
      if (type === 'checkbox' || type === 'radio') {
        out[name + ':' + (el.value || '') + ':checked'] = !!el.checked;
      } else {

    if (!draft) return;

      var name = el.getAttribute('name');
